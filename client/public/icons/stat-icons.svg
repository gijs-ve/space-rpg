<svg xmlns="http://www.w3.org/2000/svg" width="192" height="32" viewBox="0 0 192 32">
  <defs>
    <!-- Attack: deep crimson/plasma -->
    <linearGradient id="atk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c03060"/>
      <stop offset="100%" stop-color="#500818"/>
    </linearGradient>
    <!-- Defense: navy/steel blue -->
    <linearGradient id="def-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2860c8"/>
      <stop offset="100%" stop-color="#081840"/>
    </linearGradient>
    <!-- Max Energy: electric yellow -->
    <linearGradient id="egy-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0a000"/>
      <stop offset="100%" stop-color="#402800"/>
    </linearGradient>
    <!-- Max Health: vivid green -->
    <linearGradient id="hp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20c060"/>
      <stop offset="100%" stop-color="#063018"/>
    </linearGradient>
    <!-- Gathering: earthy orange/amber -->
    <linearGradient id="gth-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b87020"/>
      <stop offset="100%" stop-color="#301800"/>
    </linearGradient>
    <!-- Speed: deep space purple/blue -->
    <linearGradient id="spd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2030a8"/>
      <stop offset="100%" stop-color="#040818"/>
    </linearGradient>
    <!-- Plasma bolt glow -->
    <linearGradient id="plasma" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff40a0"/>
      <stop offset="60%" stop-color="#ff80c0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Shield face -->
    <linearGradient id="shield-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5090e8"/>
      <stop offset="100%" stop-color="#1040a0"/>
    </linearGradient>
    <!-- Shuttle body -->
    <linearGradient id="shuttle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0c8d8"/>
      <stop offset="100%" stop-color="#606878"/>
    </linearGradient>
  </defs>

  <!-- ════════════════════════════ -->
  <!-- ICON 0: ATTACK (x=0)        -->
  <!-- Plasma pistol firing right  -->
  <!-- ════════════════════════════ -->
  <rect x="0" y="0" width="32" height="32" fill="url(#atk-bg)" rx="4"/>
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#200008" stroke-width="1.5" rx="4"/>

  <!-- Gun barrel -->
  <rect x="5"  y="14" width="14" height="4" fill="#d04070" rx="1"/>
  <rect x="5"  y="14" width="14" height="4" fill="none" stroke="#200008" stroke-width="0.75" rx="1"/>
  <!-- Barrel tip glow ring -->
  <rect x="4"  y="13" width="3"  height="6" fill="#ff80b0" rx="1"/>
  <rect x="4"  y="13" width="3"  height="6" fill="none" stroke="#200008" stroke-width="0.75" rx="1"/>
  <!-- Handle -->
  <rect x="14" y="18" width="5"  height="7" fill="#a03050" rx="1"/>
  <rect x="14" y="18" width="5"  height="7" fill="none" stroke="#200008" stroke-width="0.75" rx="1"/>
  <!-- Body block -->
  <rect x="13" y="13" width="8"  height="6" fill="#e05080" rx="1"/>
  <rect x="13" y="13" width="8"  height="6" fill="none" stroke="#200008" stroke-width="0.75" rx="1"/>
  <!-- Energy cell on body -->
  <rect x="15" y="14" width="4"  height="4" fill="#ff40a0"/>
  <rect x="15" y="14" width="4"  height="4" fill="none" stroke="#200008" stroke-width="0.5"/>
  <rect x="15" y="14" width="4"  height="2" fill="#ff90c8" opacity="0.6"/>

  <!-- Plasma bolt flying right -->
  <rect x="21" y="15" width="7"  height="2" fill="url(#plasma)" rx="1"/>
  <!-- Bolt glow trail -->
  <rect x="21" y="14" width="5"  height="1" fill="#ff80c0" opacity="0.5" rx="1"/>
  <rect x="21" y="17" width="5"  height="1" fill="#ff80c0" opacity="0.5" rx="1"/>
  <!-- Bolt tip bright -->
  <rect x="27" y="15" width="2"  height="2" fill="#ffffff" opacity="0.9" rx="0.5"/>


  <!-- ════════════════════════════ -->
  <!-- ICON 1: DEFENSE (x=32)      -->
  <!-- Sci-fi hexagonal shield      -->
  <!-- ════════════════════════════ -->
  <rect x="32" y="0" width="32" height="32" fill="url(#def-bg)" rx="4"/>
  <rect x="32" y="0" width="32" height="32" fill="none" stroke="#020810" stroke-width="1.5" rx="4"/>

  <!-- Shield outer rim (pixel hex approximation) -->
  <rect x="43" y="7"  width="10" height="2"  fill="#4080d8"/>
  <rect x="41" y="9"  width="14" height="2"  fill="#3870c8"/>
  <rect x="39" y="11" width="18" height="10" fill="url(#shield-face)"/>
  <rect x="41" y="21" width="14" height="2"  fill="#3060b0"/>
  <rect x="43" y="23" width="10" height="2"  fill="#2050a0"/>
  <!-- Bottom point -->
  <rect x="45" y="25" width="6"  height="2"  fill="#1840880"/>
  <rect x="46" y="27" width="4"  height="2"  fill="#103070"/>
  <rect x="47" y="29" width="2"  height="1"  fill="#081c50"/>

  <!-- Shield outline border -->
  <rect x="43" y="7"  width="10" height="2"  fill="none" stroke="#020810" stroke-width="0.75"/>
  <rect x="41" y="9"  width="14" height="2"  fill="none" stroke="#020810" stroke-width="0.75"/>
  <rect x="39" y="11" width="18" height="10" fill="none" stroke="#020810" stroke-width="0.75"/>
  <rect x="41" y="21" width="14" height="2"  fill="none" stroke="#020810" stroke-width="0.75"/>
  <rect x="43" y="23" width="10" height="2"  fill="none" stroke="#020810" stroke-width="0.75"/>

  <!-- Inner shield panel line (horizontal divider) -->
  <rect x="40" y="16" width="16" height="1"  fill="#60a0f0" opacity="0.5"/>
  <!-- Inner hex lines (vertical) -->
  <rect x="48" y="12" width="1"  height="8"  fill="#80b0ff" opacity="0.3"/>

  <!-- Shield shine (top-left highlight) -->
  <rect x="40" y="12" width="5"  height="2"  fill="#a0c8ff" opacity="0.6" rx="1"/>
  <rect x="40" y="11" width="3"  height="1"  fill="#ffffff"  opacity="0.4"/>
  <!-- Sci-fi center emblem (small cross) -->
  <rect x="47" y="13" width="3"  height="7"  fill="#80b8ff" opacity="0.5"/>
  <rect x="44" y="16" width="9"  height="2"  fill="#80b8ff" opacity="0.5"/>


  <!-- ════════════════════════════ -->
  <!-- ICON 2: MAX ENERGY (x=64)   -->
  <!-- ⚡ lightning bolt, centered  -->
  <!-- ════════════════════════════ -->
  <rect x="64" y="0" width="32" height="32" fill="url(#egy-bg)" rx="4"/>
  <rect x="64" y="0" width="32" height="32" fill="none" stroke="#180c00" stroke-width="1.5" rx="4"/>

  <!-- ⚡ bolt drawn as filled polygon rows.
       Upper wing: top-right corner, each row shifts LEFT (going down).
       Lower wing: bottom-left corner, each row shifts RIGHT (going up from bottom).
       This creates the Z/zigzag shape.

       Icon x range: 64–96. Center = 80.
       Upper wing top-right at x=87, steps left. Left edge fixed ~x=72.
       Lower wing bottom-left at x=68, steps right. Right edge fixed ~x=82.
  -->

  <!-- UPPER WING (top-right leaning down-left) -->
  <!-- Row y=4:  x=76..87  width=11 -->
  <rect x="76" y="4"  width="11" height="3" fill="#fff060"/>
  <!-- Row y=7:  x=74..85  width=11 -->
  <rect x="74" y="7"  width="11" height="3" fill="#ffe840"/>
  <!-- Row y=10: x=72..83  width=11 -->
  <rect x="72" y="10" width="11" height="3" fill="#ffd820"/>
  <!-- Row y=13: x=70..81  width=11 — bottom of upper wing, ends at waist -->
  <rect x="70" y="13" width="11" height="2" fill="#ffc800"/>

  <!-- LOWER WING (bottom-left leaning up-right) -->
  <!-- Row y=17: x=69..80  width=11 — top of lower wing, starts at waist -->
  <rect x="69" y="17" width="11" height="2" fill="#ffb000"/>
  <!-- Row y=19: x=71..82  width=11 -->
  <rect x="71" y="19" width="11" height="3" fill="#ffa000"/>
  <!-- Row y=22: x=73..84  width=11 -->
  <rect x="73" y="22" width="11" height="3" fill="#ff9000"/>
  <!-- Row y=25: x=75..86  width=11 -->
  <rect x="75" y="25" width="11" height="3" fill="#ff8000"/>

  <!-- WAIST connector (narrow bridge between wings) -->
  <rect x="71" y="15" width="9"  height="2" fill="#ffbc00"/>

  <!-- Outlines -->
  <rect x="76" y="4"  width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="74" y="7"  width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="72" y="10" width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="70" y="13" width="11" height="2" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="71" y="15" width="9"  height="2" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="69" y="17" width="11" height="2" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="71" y="19" width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="73" y="22" width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>
  <rect x="75" y="25" width="11" height="3" fill="none" stroke="#180c00" stroke-width="0.75"/>

  <!-- Highlight streak top-left of upper wing -->
  <rect x="76" y="5"  width="4"  height="2" fill="#ffffff" opacity="0.65"/>
  <rect x="74" y="8"  width="3"  height="2" fill="#ffffff" opacity="0.4"/>
  <rect x="72" y="11" width="2"  height="2" fill="#ffffff" opacity="0.25"/>


  <!-- ════════════════════════════ -->
  <!-- ICON 3: MAX HEALTH (x=96)   -->
  <!-- Pixel heart with cross       -->
  <!-- ════════════════════════════ -->
  <rect x="96" y="0" width="32" height="32" fill="url(#hp-bg)" rx="4"/>
  <rect x="96" y="0" width="32" height="32" fill="none" stroke="#021008" stroke-width="1.5" rx="4"/>

  <!-- Heart pixel shape -->
  <rect x="100" y="10" width="5"  height="4"  fill="#40e888"/>
  <rect x="119" y="10" width="5"  height="4"  fill="#40e888"/>
  <rect x="98"  y="12" width="9"  height="6"  fill="#30d878"/>
  <rect x="117" y="12" width="9"  height="6"  fill="#30d878"/>
  <rect x="97"  y="14" width="30" height="6"  fill="#28cc70"/>
  <rect x="98"  y="20" width="28" height="4"  fill="#20c060"/>
  <rect x="100" y="24" width="24" height="3"  fill="#18b058"/>
  <rect x="103" y="27" width="18" height="2"  fill="#10a050"/>
  <rect x="106" y="29" width="12" height="2"  fill="#089040"/>
  <rect x="109" y="31" width="6"  height="1"  fill="#047030"/>

  <!-- Outlines (key edges) -->
  <rect x="100" y="10" width="5"  height="2"  fill="none" stroke="#021008" stroke-width="0.75"/>
  <rect x="119" y="10" width="5"  height="2"  fill="none" stroke="#021008" stroke-width="0.75"/>
  <rect x="97"  y="14" width="30" height="1"  fill="#021008" opacity="0.4"/>

  <!-- White medical cross overlay -->
  <rect x="110" y="14" width="4"  height="10" fill="#ffffff" opacity="0.85"/>
  <rect x="107" y="17" width="10" height="4"  fill="#ffffff" opacity="0.85"/>
  <!-- Cross outline -->
  <rect x="110" y="14" width="4"  height="10" fill="none" stroke="#021008" stroke-width="0.5"/>
  <rect x="107" y="17" width="10" height="4"  fill="none" stroke="#021008" stroke-width="0.5"/>

  <!-- Heart shine -->
  <rect x="100" y="13" width="6"  height="2"  fill="#a0ffc0" opacity="0.5" rx="0.5"/>
  <rect x="119" y="13" width="6"  height="2"  fill="#a0ffc0" opacity="0.5" rx="0.5"/>


  <!-- ════════════════════════════ -->
  <!-- ICON 4: GATHERING (x=128)   -->
  <!-- Pixel plant / sprout         -->
  <!-- ════════════════════════════ -->
  <rect x="128" y="0" width="32" height="32" fill="url(#gth-bg)" rx="4"/>
  <rect x="128" y="0" width="32" height="32" fill="none" stroke="#180800" stroke-width="1.5" rx="4"/>

  <!-- Stem -->
  <rect x="143" y="17" width="3"  height="11" fill="#508020"/>
  <rect x="143" y="17" width="3"  height="11" fill="none" stroke="#180800" stroke-width="0.75"/>
  <!-- Stem highlight -->
  <rect x="143" y="18" width="1"  height="9"  fill="#70b030" opacity="0.6"/>

  <!-- Left leaf -->
  <rect x="133" y="16" width="10" height="3"  fill="#60a828"/>
  <rect x="134" y="13" width="8"  height="3"  fill="#70c030"/>
  <rect x="136" y="11" width="6"  height="2"  fill="#80d038"/>
  <rect x="138" y="9"  width="4"  height="2"  fill="#90d840"/>
  <rect x="133" y="16" width="10" height="3"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="134" y="13" width="8"  height="3"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="136" y="11" width="6"  height="2"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <!-- Left leaf vein -->
  <rect x="135" y="14" width="7"  height="1"  fill="#a0e858" opacity="0.5"/>
  <!-- Left leaf shine -->
  <rect x="137" y="10" width="3"  height="1"  fill="#c8f870" opacity="0.6"/>

  <!-- Right leaf -->
  <rect x="146" y="13" width="10" height="3"  fill="#58a020"/>
  <rect x="147" y="10" width="8"  height="3"  fill="#68b828"/>
  <rect x="148" y="8"  width="6"  height="2"  fill="#78c830"/>
  <rect x="149" y="6"  width="4"  height="2"  fill="#88d038"/>
  <rect x="146" y="13" width="10" height="3"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="147" y="10" width="8"  height="3"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="148" y="8"  width="6"  height="2"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <!-- Right leaf vein -->
  <rect x="148" y="11" width="7"  height="1"  fill="#98e050" opacity="0.5"/>
  <!-- Right leaf shine -->
  <rect x="150" y="7"  width="3"  height="1"  fill="#c0f060" opacity="0.6"/>

  <!-- Top bud / flower -->
  <rect x="142" y="13" width="5"  height="4"  fill="#e06828"/>
  <rect x="143" y="11" width="3"  height="2"  fill="#f08030"/>
  <rect x="142" y="13" width="5"  height="4"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="143" y="11" width="3"  height="2"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <!-- Bud shine -->
  <rect x="143" y="12" width="2"  height="1"  fill="#ffc070" opacity="0.7"/>

  <!-- Soil / ground line -->
  <rect x="132" y="27" width="25" height="3"  fill="#603010"/>
  <rect x="132" y="27" width="25" height="3"  fill="none" stroke="#180800" stroke-width="0.75"/>
  <rect x="133" y="27" width="23" height="1"  fill="#804020" opacity="0.5"/>


  <!-- ════════════════════════════ -->
  <!-- ICON 5: SPEED (x=160)       -->
  <!-- Spaceshuttle with thrust     -->
  <!-- ════════════════════════════ -->
  <rect x="160" y="0" width="32" height="32" fill="url(#spd-bg)" rx="4"/>
  <rect x="160" y="0" width="32" height="32" fill="none" stroke="#020408" stroke-width="1.5" rx="4"/>

  <!-- Star field / speed lines -->
  <rect x="162" y="9"  width="5"  height="1"  fill="#4060c0" opacity="0.7"/>
  <rect x="161" y="16" width="7"  height="1"  fill="#3050b0" opacity="0.6"/>
  <rect x="162" y="23" width="4"  height="1"  fill="#4060c0" opacity="0.7"/>
  <rect x="163" y="12" width="3"  height="1"  fill="#2040a0" opacity="0.5"/>
  <rect x="162" y="20" width="6"  height="1"  fill="#2040a0" opacity="0.5"/>

  <!-- Shuttle nose (pointing right) -->
  <rect x="186" y="15" width="3"  height="2"  fill="#d0d8e8"/>
  <rect x="184" y="14" width="3"  height="4"  fill="#c8d0e0"/>

  <!-- Main fuselage -->
  <rect x="172" y="13" width="13" height="6"  fill="url(#shuttle)"/>
  <rect x="172" y="13" width="13" height="6"  fill="none" stroke="#020408" stroke-width="0.75"/>
  <!-- Cockpit window -->
  <rect x="179" y="14" width="4"  height="4"  fill="#60c0ff"/>
  <rect x="179" y="14" width="4"  height="4"  fill="none" stroke="#020408" stroke-width="0.5"/>
  <rect x="180" y="14" width="2"  height="2"  fill="#a0e0ff" opacity="0.8"/>

  <!-- Top fin -->
  <rect x="173" y="10" width="5"  height="3"  fill="#9098a8"/>
  <rect x="174" y="8"  width="3"  height="2"  fill="#808898"/>
  <rect x="173" y="10" width="5"  height="3"  fill="none" stroke="#020408" stroke-width="0.75"/>

  <!-- Bottom fin -->
  <rect x="173" y="19" width="5"  height="3"  fill="#9098a8"/>
  <rect x="174" y="22" width="3"  height="2"  fill="#808898"/>
  <rect x="173" y="19" width="5"  height="3"  fill="none" stroke="#020408" stroke-width="0.75"/>

  <!-- Engine nozzle -->
  <rect x="170" y="14" width="3"  height="4"  fill="#707880"/>
  <rect x="170" y="14" width="3"  height="4"  fill="none" stroke="#020408" stroke-width="0.75"/>

  <!-- Thrust flame -->
  <rect x="163" y="14" width="8"  height="4"  fill="#ff8020"/>
  <rect x="163" y="15" width="6"  height="2"  fill="#ffcc40"/>
  <rect x="163" y="15" width="3"  height="2"  fill="#ffffff" opacity="0.6"/>
  <!-- Flame taper -->
  <rect x="162" y="15" width="2"  height="2"  fill="#ff6010" opacity="0.7"/>
  <rect x="161" y="15" width="2"  height="2"  fill="#ff4000" opacity="0.4"/>

  <!-- Fuselage stripe -->
  <rect x="173" y="16" width="11" height="1"  fill="#ffffff" opacity="0.2"/>
  <!-- Nose outline -->
  <rect x="186" y="15" width="3"  height="2"  fill="none" stroke="#020408" stroke-width="0.75"/>
  <rect x="184" y="14" width="3"  height="4"  fill="none" stroke="#020408" stroke-width="0.75"/>
</svg>
